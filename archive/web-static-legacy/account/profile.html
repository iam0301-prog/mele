<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人資料 · 命理媒介中心</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="container" style="max-width:680px">
  <a href="../" style="color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px">‹ 回首頁</a>

  <header style="padding:30px 0">
    <div class="ornament">◆ ◆ ◆</div>
    <h1>個人資料</h1>
    <div class="subtitle">MY PROFILE</div>
  </header>

  <div id="needLogin" class="card" style="display:none;text-align:center">
    <div style="font-size:14px;margin:20px 0">請先登入</div>
    <a href="login.html" class="btn-primary" style="text-decoration:none">前往登入</a>
  </div>

  <div id="main" style="display:none">
    <div class="card">
      <div class="section-title">基本資料</div>
      <div class="section-subtitle">BASIC INFO</div>
      <div class="input-row"><label>顯示名稱</label><input id="displayName"></div>
      <div class="input-row"><label>個人簡介</label><textarea id="bio" rows="3" placeholder="一段簡單的自我介紹（選填）"></textarea></div>
      <div class="input-row">
        <label>性別</label>
        <select id="gender">
          <option value="未填">未填</option>
          <option value="男">男</option>
          <option value="女">女</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="section-title">生辰資料</div>
      <div class="section-subtitle">BIRTH DATA · 諮詢老師時自動帶入</div>
      <div style="font-size:12px;color:rgba(244,162,97,0.85);background:rgba(244,162,97,0.08);border-left:2px solid var(--warning);padding:8px 12px;border-radius:6px;margin-bottom:14px">
        高敏感個資。僅在你預約諮詢時提供給你選擇的老師，平台不對外揭露。
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="input-row"><label>生日</label><input id="birthDate" type="date"></div>
        <div class="input-row"><label>出生時間</label><input id="birthTime" type="time"></div>
      </div>
      <div class="input-row"><label>出生地點（文字）</label><input id="birthLocation" placeholder="例：台北市"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div class="input-row"><label>緯度</label><input id="birthLat" type="number" step="0.0001"></div>
        <div class="input-row"><label>經度</label><input id="birthLon" type="number" step="0.0001"></div>
        <div class="input-row"><label>時區</label><input id="birthTz" placeholder="Asia/Taipei"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">隱私與通知偏好</div>
      <div style="font-size:13px;line-height:2.2">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="marketing"> 願意收到平台優惠 / 課程資訊
        </label>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:8px">
          隱私同意紀錄：<span id="consentInfo">-</span>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" id="saveBtn">儲存</button>
      <button class="btn-secondary" id="downloadBtn">下載我的全部資料（個資法權利）</button>
      <button class="btn-secondary" style="color:#ff8a8a;border-color:rgba(184,0,31,0.5)" id="deleteBtn">刪除帳號</button>
    </div>
  </div>
</div>

<script src="../assets/config.js"></script>
<script type="module">
import { supabase, getCurrentUser, toast } from '../assets/supabase-client.js';

let user = null, profile = null;

(async () => {
  user = await getCurrentUser();
  if (!user) { document.getElementById('needLogin').style.display = 'block'; return; }
  document.getElementById('main').style.display = 'block';
  const { data } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
  profile = data || {};
  fill();
})();

function fill() {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v ?? ''; };
  set('displayName', profile.display_name);
  set('bio', profile.bio);
  set('gender', profile.gender || '未填');
  set('birthDate', profile.birth_date);
  set('birthTime', profile.birth_time);
  set('birthLocation', profile.birth_location);
  set('birthLat', profile.birth_lat);
  set('birthLon', profile.birth_lon);
  set('birthTz', profile.birth_timezone);
  document.getElementById('marketing').checked = !!profile.marketing_opt_in;
  if (profile.privacy_consent_at) {
    document.getElementById('consentInfo').textContent =
      `${new Date(profile.privacy_consent_at).toLocaleDateString('zh-TW')}（v${profile.privacy_consent_version || '1.0'}）`;
  }
}

document.getElementById('saveBtn').onclick = async () => {
  const get = (id) => document.getElementById(id).value || null;
  const patch = {
    display_name: get('displayName'),
    bio: get('bio'),
    gender: get('gender'),
    birth_date: get('birthDate'),
    birth_time: get('birthTime'),
    birth_location: get('birthLocation'),
    birth_lat: get('birthLat') ? parseFloat(get('birthLat')) : null,
    birth_lon: get('birthLon') ? parseFloat(get('birthLon')) : null,
    birth_timezone: get('birthTz'),
    marketing_opt_in: document.getElementById('marketing').checked,
  };
  const { error } = await supabase.from('profiles').update(patch).eq('id', user.id);
  if (error) return toast(error.message, 'error');
  toast('已儲存 ✦');
};

document.getElementById('downloadBtn').onclick = async () => {
  const [{ data: prof }, { data: bookings }, { data: charts }, { data: consents }] = await Promise.all([
    supabase.from('profiles').select('*').eq('id', user.id).maybeSingle(),
    supabase.from('bookings').select('*').eq('customer_id', user.id),
    supabase.from('chart_records').select('*').eq('user_id', user.id),
    supabase.from('consent_log').select('*').eq('user_id', user.id),
  ]);
  const blob = new Blob([JSON.stringify({ profile: prof, bookings, charts, consents }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mele-data-${user.id}-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  toast('已下載');
};

document.getElementById('deleteBtn').onclick = async () => {
  if (!confirm('確定刪除帳號？此動作不可復原。\n依個資法，30 天後完全清除。')) return;
  const reason = prompt('（選填）告訴我們你離開的原因');
  await supabase.from('profiles').update({ bio: '[deleted] ' + (reason || '') }).eq('id', user.id);
  await supabase.auth.signOut();
  toast('已申請刪除');
  setTimeout(() => location.href = '../', 1500);
};
</script>
</body>
</html>
