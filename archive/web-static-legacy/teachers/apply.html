<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老師申請 · 命理媒介中心</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="container">
  <header>
    <div class="ornament">◆ ◆ ◆</div>
    <h1>加入我們</h1>
    <div class="subtitle">BECOME A READER</div>
    <div style="margin-top:24px;color:rgba(255,255,255,0.7);max-width:560px;margin:24px auto 0;font-size:14px;line-height:1.9">
      命理媒介中心歡迎專業老師加入。<br>
      申請流程：申請 → 審核 → 試講 → 簽約 → 上架。整個過程約 7-14 天。
    </div>
  </header>

  <!-- 未登入 -->
  <div id="authBox" class="card" style="display:none">
    <div class="section-title">先登入或註冊</div>
    <div class="section-subtitle">SIGN IN / SIGN UP</div>
    <div class="input-row">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email">
    </div>
    <div class="input-row">
      <label>密碼</label>
      <input id="pwd" type="password" autocomplete="new-password" minlength="6">
    </div>
    <div class="flex-row">
      <button class="btn-primary" id="signInBtn">登入</button>
      <button class="btn-secondary" id="signUpBtn">建立新帳號</button>
    </div>
  </div>

  <!-- 已有申請 -->
  <div id="existingBox" class="card" style="display:none">
    <div class="section-title">你的申請</div>
    <div id="existingContent"></div>
  </div>

  <!-- 申請表單 -->
  <div id="formBox" class="card" style="display:none">
    <div class="section-title">老師申請表</div>
    <div class="section-subtitle">APPLICATION FORM</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="input-row"><label>真實姓名 *</label><input id="legal_name" required></div>
      <div class="input-row"><label>對外顯示名 *</label><input id="display_name" required placeholder="例：星辰老師"></div>
      <div class="input-row"><label>Email *</label><input id="email_field" type="email" required></div>
      <div class="input-row"><label>聯絡電話 *</label><input id="phone" required></div>
    </div>

    <div class="input-row">
      <label>專長領域 *（可複選）</label>
      <div id="specialtyChips" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>

    <div class="input-row">
      <label>30 字內自介 *（卡片上會顯示）</label>
      <input id="intro_short" maxlength="30" required>
    </div>
    <div class="input-row">
      <label>長版介紹</label>
      <textarea id="intro_long" rows="5" placeholder="為什麼想成為命理老師、你的特色、可以幫助什麼樣的人..."></textarea>
    </div>
    <div class="input-row">
      <label>一句格言</label>
      <input id="quote" placeholder="例：宇宙從不為難準備好的靈魂">
    </div>

    <div class="section-title" style="font-size:18px;margin-top:30px">證件 / 影片</div>
    <div class="section-subtitle">DOCUMENTS</div>
    <div class="input-row">
      <label>證件正面（身分證 / 護照）</label>
      <input type="file" id="id_front" accept="image/*">
    </div>
    <div class="input-row">
      <label>證件背面</label>
      <input type="file" id="id_back" accept="image/*">
    </div>
    <div class="input-row">
      <label>3 分鐘自介影片（可放 YouTube 或上傳）</label>
      <input id="intro_video_url" type="url" placeholder="https://youtu.be/...">
    </div>

    <div class="section-title" style="font-size:18px;margin-top:30px">社群連結</div>
    <div class="section-subtitle">SOCIAL LINKS（讓客戶找到你）</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="input-row"><label>LINE 加好友連結</label><input id="line_url" type="url" placeholder="https://lin.ee/..."></div>
      <div class="input-row"><label>Instagram</label><input id="instagram" type="url" placeholder="https://instagram.com/..."></div>
      <div class="input-row"><label>Threads</label><input id="threads" type="url" placeholder="https://threads.net/@..."></div>
      <div class="input-row"><label>Facebook</label><input id="facebook" type="url" placeholder="https://facebook.com/..."></div>
      <div class="input-row"><label>YouTube</label><input id="youtube" type="url"></div>
      <div class="input-row"><label>個人網站</label><input id="website" type="url"></div>
    </div>

    <div style="background:rgba(201,162,39,0.08);border:1px solid var(--accent-dim);border-radius:10px;padding:16px;margin:24px 0;font-size:13px;line-height:1.8">
      <strong style="color:var(--accent)">送出前請確認</strong><br>
      • 我們將進行 7-14 天審核（含試講）<br>
      • 審核期間我們會通過 Email 與你聯繫<br>
      • 上架後可在後台自助管理時段、價格、服務項目<br>
      • 平台抽成預設 10%，會在簽約時最終確認
    </div>

    <div class="flex-row">
      <button class="btn-primary" id="submitBtn">送出申請</button>
      <button class="btn-secondary" id="signOutBtn">登出</button>
    </div>
  </div>
</div>

<script src="../assets/config.js"></script>
<script type="module">
import { supabase, getCurrentUser, toast } from '../assets/supabase-client.js';

const SPECIALTIES = ['八字', '紫微斗數', '塔羅', '盧恩', '占星', '人類圖', '靈數', '瑪雅', '易經', '風水', '姓名學', '催眠'];

document.getElementById('specialtyChips').innerHTML = SPECIALTIES.map((s) => `
  <label style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--accent-dim);border-radius:14px;cursor:pointer;font-size:13px">
    <input type="checkbox" value="${s}" style="margin:0">
    ${s}
  </label>
`).join('');

async function init() {
  const user = await getCurrentUser();
  if (!user) {
    document.getElementById('authBox').style.display = 'block';
    return;
  }
  // 檢查是否已有申請
  const { data } = await supabase.from('teacher_applications').select('*').eq('user_id', user.id).order('submitted_at', { ascending: false }).limit(1);
  if (data && data.length) {
    showExisting(data[0]);
  } else {
    document.getElementById('formBox').style.display = 'block';
    document.getElementById('email_field').value = user.email || '';
  }
}

function showExisting(a) {
  const labels = {
    pending: '⏳ 待審核', reviewing: '👀 審核中', revision: '📝 需補件',
    rejected: '✗ 已拒絕', interview: '🎤 試講中', contracted: '✓ 已簽約',
    active: '★ 已上架',
  };
  document.getElementById('existingBox').style.display = 'block';
  document.getElementById('existingContent').innerHTML = `
    <div style="text-align:center;padding:30px 20px">
      <div style="font-size:32px;color:var(--accent);margin-bottom:10px">${labels[a.status] || a.status}</div>
      <div style="color:rgba(255,255,255,0.7);margin-bottom:20px">送出於 ${new Date(a.submitted_at).toLocaleDateString('zh-TW')}</div>
      ${a.reviewer_notes ? `
        <div style="text-align:left;background:rgba(0,0,0,0.3);padding:14px;border-radius:8px;font-size:13px">
          <strong style="color:var(--accent)">審核回覆</strong><br>${a.reviewer_notes}
        </div>` : ''}
      ${a.status === 'revision' ? `<button class="btn-primary" style="margin-top:20px" onclick="location.reload()">補件後重新送出</button>` : ''}
      <button class="btn-secondary" id="signOutBtn2" style="margin-top:20px">登出</button>
    </div>
  `;
  document.getElementById('signOutBtn2').onclick = signOut;
}

document.getElementById('signInBtn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pwd').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) return toast(error.message, 'error');
  location.reload();
};

document.getElementById('signUpBtn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('pwd').value;
  if (password.length < 6) return toast('密碼至少 6 字', 'error');
  const { error } = await supabase.auth.signUp({ email, password });
  if (error) return toast(error.message, 'error');
  toast('註冊成功，請查收 Email 驗證');
  setTimeout(() => location.reload(), 1500);
};

async function signOut() {
  await supabase.auth.signOut();
  location.reload();
}
window.signOut = signOut;
document.getElementById('signOutBtn')?.addEventListener('click', signOut);

document.getElementById('submitBtn').onclick = async () => {
  const get = (id) => document.getElementById(id).value.trim();
  const specialties = [...document.querySelectorAll('#specialtyChips input:checked')].map((i) => i.value);
  if (!specialties.length) return toast('請選至少一個專長', 'error');

  // 上傳證件到 Storage
  const user = await getCurrentUser();
  async function upload(fileInput, bucket = 'teacher-docs') {
    const f = fileInput.files[0];
    if (!f) return null;
    const path = `${user.id}/${Date.now()}-${f.name}`;
    const { error } = await supabase.storage.from(bucket).upload(path, f);
    if (error) { toast('上傳失敗：' + error.message, 'error'); return null; }
    const { data } = supabase.storage.from(bucket).getPublicUrl(path);
    return data.publicUrl;
  }
  const idFront = await upload(document.getElementById('id_front'));
  const idBack = await upload(document.getElementById('id_back'));

  const { error } = await supabase.rpc('submit_teacher_application', {
    p_legal_name: get('legal_name'),
    p_display_name: get('display_name'),
    p_email: get('email_field'),
    p_phone: get('phone'),
    p_specialties: specialties,
    p_intro_short: get('intro_short'),
    p_intro_long: get('intro_long'),
    p_quote: get('quote'),
    p_id_doc_front_url: idFront,
    p_id_doc_back_url: idBack,
    p_intro_video_url: get('intro_video_url'),
    p_line_url: get('line_url'),
    p_instagram: get('instagram'),
    p_facebook: get('facebook'),
    p_threads: get('threads'),
    p_youtube: get('youtube'),
  });
  if (error) return toast(error.message, 'error');
  toast('申請已送出 ✦');
  setTimeout(() => location.reload(), 1500);
};

init();
</script>
</body>
</html>
