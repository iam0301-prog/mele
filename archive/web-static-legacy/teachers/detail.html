<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老師資訊 · 命理媒介中心</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<style>
.profile-head { display: grid; grid-template-columns: 140px 1fr; gap: 30px; align-items: center; }
.big-avatar {
  width: 140px; height: 140px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  font-family: "Noto Serif TC"; font-size: 56px; font-weight: 700; color: var(--primary);
}
.service-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--accent-dim);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 14px;
  flex-wrap: wrap;
}
.service-card .meta { flex: 1; min-width: 220px; }
.service-card .price { font-family: "Noto Serif TC"; font-size: 24px; color: var(--accent); }
@media (max-width: 600px) {
  .profile-head { grid-template-columns: 1fr; text-align: center; }
  .big-avatar { margin: 0 auto; }
}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" style="color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px">‹ 回老師列表</a>

  <div id="content" style="margin-top:20px"></div>
</div>

<script src="../assets/config.js"></script>
<script type="module">
import { supabase, getCurrentUser, toast } from '../assets/supabase-client.js';

const params = new URLSearchParams(location.search);
const id = params.get('id');

const ICONS = { line: 'LINE', instagram: '◉ IG', facebook: 'f FB', threads: '@ Threads', youtube: '▶ YT', website: '⌂ Web' };

async function load() {
  if (!id) { document.getElementById('content').innerHTML = '<div class="card empty-state">缺少 id 參數</div>'; return; }
  const { data: t } = await supabase.from('teachers').select('*').eq('id', id).eq('status', 'active').maybeSingle();
  if (!t) { document.getElementById('content').innerHTML = '<div class="card empty-state">老師不存在或已下架</div>'; return; }
  const { data: services } = await supabase.from('teacher_services').select('*').eq('teacher_id', id).eq('is_active', true).order('display_order');
  const { data: reviews } = await supabase.from('reviews').select('*').eq('teacher_id', id).eq('is_visible', true).order('created_at', { ascending: false }).limit(10);

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="profile-head">
        <div class="big-avatar">${(t.display_name || '?').charAt(0)}</div>
        <div>
          <div style="font-family:'Noto Serif TC';font-size:32px;color:var(--accent);letter-spacing:4px">${t.display_name}</div>
          <div style="color:rgba(255,255,255,0.6);font-size:14px;margin-top:6px">${t.title || ''}</div>
          <div style="margin-top:12px;color:#FFD700">★ ${t.rating || '—'} <span style="color:rgba(255,255,255,0.6)">(${t.total_reviews || 0} 評價 · ${t.cases_count || 0} 諮詢)</span></div>
          <div style="margin-top:14px">
            ${(t.specialties || []).map((s) => `<span style="display:inline-block;padding:4px 12px;border:1px solid var(--accent-dim);border-radius:14px;margin:3px;font-size:12px">${s}</span>`).join('')}
          </div>
          <div style="margin-top:14px;display:flex;gap:14px;flex-wrap:wrap;font-size:13px">
            ${t.line_url ? `<a href="${t.line_url}" target="_blank" style="color:var(--accent-light)">${ICONS.line}</a>` : ''}
            ${t.instagram ? `<a href="${t.instagram}" target="_blank" style="color:var(--accent-light)">${ICONS.instagram}</a>` : ''}
            ${t.threads ? `<a href="${t.threads}" target="_blank" style="color:var(--accent-light)">${ICONS.threads}</a>` : ''}
            ${t.facebook ? `<a href="${t.facebook}" target="_blank" style="color:var(--accent-light)">${ICONS.facebook}</a>` : ''}
            ${t.youtube ? `<a href="${t.youtube}" target="_blank" style="color:var(--accent-light)">${ICONS.youtube}</a>` : ''}
            ${t.website ? `<a href="${t.website}" target="_blank" style="color:var(--accent-light)">${ICONS.website}</a>` : ''}
          </div>
        </div>
      </div>

      ${t.quote ? `<div style="margin-top:30px;padding:20px;background:rgba(0,0,0,0.25);border-left:3px solid var(--accent);font-style:italic;color:rgba(255,255,255,0.85)">「${t.quote}」</div>` : ''}

      ${t.intro_long ? `<div style="margin-top:24px;line-height:1.9;color:rgba(255,255,255,0.85);white-space:pre-wrap">${t.intro_long}</div>` : ''}
    </div>

    ${services && services.length ? `
    <div class="card">
      <div class="section-title">服務項目</div>
      <div class="section-subtitle">SERVICES</div>
      ${services.map((s) => `
        <div class="service-card">
          <div class="meta">
            <div style="font-size:16px;font-weight:600">${s.name}</div>
            <div style="color:rgba(255,255,255,0.6);font-size:12px;margin:4px 0">${s.duration_minutes} 分鐘</div>
            ${s.description ? `<div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.7">${s.description}</div>` : ''}
          </div>
          <div style="text-align:center">
            <div class="price">NT$ ${s.price_ntd.toLocaleString()}</div>
            <button class="btn-primary" style="padding:10px 24px;font-size:12px;margin-top:6px" onclick="location.href='../account/book.html?teacher=${t.id}&service=${s.id}'">預約</button>
          </div>
        </div>`).join('')}
    </div>` : ''}

    ${reviews && reviews.length ? `
    <div class="card">
      <div class="section-title">客戶評價</div>
      <div class="section-subtitle">REVIEWS</div>
      ${reviews.map((r) => `
        <div style="padding:14px 0;border-bottom:1px solid rgba(201,162,39,0.1)">
          <div style="color:#FFD700">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
          <div style="margin-top:6px;font-size:14px;color:rgba(255,255,255,0.85)">${r.comment || '(僅評分)'}</div>
          <div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,0.4)">${new Date(r.created_at).toLocaleDateString('zh-TW')} ${r.is_anonymous ? '· 匿名' : ''}</div>
        </div>`).join('')}
    </div>` : ''}
  `;
}

load();
</script>
</body>
</html>
