<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占星 · 命理媒介中心</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<style>
.mele-result svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
.cta-after { background: linear-gradient(135deg, rgba(201,162,39,0.12), rgba(201,162,39,0.04)); border: 1px solid var(--accent); border-radius: 14px; padding: 24px; margin-top: 30px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <a href="../" style="color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px">‹ 回首頁</a>
  <header style="padding:30px 0">
    <div class="ornament">◆ ◆ ◆</div><h1>西洋占星</h1>
    <div class="subtitle">NATAL CHART</div>
    <div style="margin-top:20px;color:rgba(255,255,255,0.7);font-size:13px">Swiss Ephemeris · 10 行星 + 12 宮位 (Placidus)</div>
  </header>
  <div style="background:rgba(244,162,97,0.08);border-left:3px solid var(--warning);padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:13px;line-height:1.8">
    <strong style="color:var(--warning)">BETA · 試算版</strong><br>
    行星經度與星座採用 Swiss Ephemeris（與 astro.com 同源），精度極高。相位、行運、合盤需人工解讀，建議預約占星師。
  </div>
  <div class="card">
    <div class="section-title">輸入生辰與地點</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="input-row"><label>生日 *</label><input id="date" type="date" required></div>
      <div class="input-row"><label>出生時間 *</label><input id="time" type="time" required></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="input-row"><label>緯度</label><input id="lat" type="number" step="0.0001" value="25.0330"></div>
      <div class="input-row"><label>經度</label><input id="lon" type="number" step="0.0001" value="121.5654"></div>
    </div>
    <div class="input-row"><label>時區（東 + 西 -）</label><input id="tz" type="number" step="0.5" value="8"></div>
    <button class="btn-primary" id="calcBtn">排盤 ›</button>
  </div>
  <div id="result"></div>
</div>
<script src="../assets/config.js"></script>
<script type="module">
import { calc, mountResult, showLoading, showError, recordChart } from '../assets/mele-api.js';
import { supabase, getCurrentUser, toast } from '../assets/supabase-client.js';
const result = document.getElementById('result');
document.getElementById('calcBtn').onclick = async () => {
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  if (!date || !time) return toast('請填完整生辰', 'error');
  const [year, month, day] = date.split('-').map(Number);
  const [hour, minute] = time.split(':').map(Number);
  const input = {
    year, month, day, hour, minute,
    timezone: parseFloat(document.getElementById('tz').value),
    latitude: parseFloat(document.getElementById('lat').value),
    longitude: parseFloat(document.getElementById('lon').value),
  };
  showLoading(result, '計算行星位置…');
  try {
    const r = await calc('astro', input);
    mountResult(result, r);
    const cta = document.createElement('div');
    cta.className = 'cta-after';
    cta.innerHTML = `<div style="font-family:'Noto Serif TC';font-size:18px;color:var(--accent);margin-bottom:10px">想看相位、行運、合盤？</div>
      <a href="../teachers/index.html?spec=占星" class="btn-primary" style="text-decoration:none;display:inline-block">找占星老師諮詢 ›</a>`;
    result.appendChild(cta);
    const user = await getCurrentUser();
    await recordChart(supabase, user, 'astro', input, r.data);
  } catch (e) { showError(result, e.message); }
};
</script>
</body></html>
